name: Continuous Integration Build

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main

  workflow_dispatch: ~

jobs:
  lint-repository-files:
    name: Lint all files
    uses: syskom/ci-cd/.github/workflows/reusable-lint-files.yaml@98e078501729f51478e4bde64810a1a4fdde6656 # main
    permissions:
      checks: write
      contents: read
    with:
      lint-editorconfig: true
      lint-github-actions: true
      lint-github-workflows: true
      lint-renovate-config: true
      lint-yaml-files: true
