name: Continuous Integration Build

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main

  workflow_dispatch: ~

jobs:
  lint-repository-files:
    name: Lint all files
    uses: syskom/ci-cd/.github/workflows/reusable-lint-files.yaml@bee0f35d3ec93098e0cc5d5a5f1e10cf72b07173 # main
    permissions:
      checks: write
      contents: read
    with:
      lint-editorconfig: true
      lint-github-actions: true
      lint-github-workflows: true
      lint-renovate-config: true
      lint-yaml-files: true
